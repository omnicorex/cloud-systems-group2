<svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!--
      Eclipse mask: white everywhere EXCEPT where the moon sits.
      This punches the moon transparent so it works on any background.
    -->
    <mask id="eclipse-mask">
      <rect width="44" height="44" fill="white"/>
      <circle cx="25" cy="22" r="11" fill="black"/>
    </mask>

    <!-- Soft radial glow behind sun -->
    <radialGradient id="sun-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#c4753b" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#c4753b" stop-opacity="0"/>
    </radialGradient>

    <!-- Sun body gradient — warm limb darkening -->
    <radialGradient id="sun-body" cx="38%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#e8924a"/>
      <stop offset="60%"  stop-color="#c4753b"/>
      <stop offset="100%" stop-color="#9a5526"/>
    </radialGradient>

    <!-- Corona ray gradient (fades to transparent at tip) -->
    <linearGradient id="ray-fade-top" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#c4753b" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#c4753b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ray-fade-bottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4753b" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#c4753b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ray-fade-left" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#c4753b" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#c4753b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ray-fade-tl" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#c4753b" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#c4753b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ray-fade-bl" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c4753b" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#c4753b" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ── Outer atmosphere rings (masked to crescent side) ── -->
  <circle cx="19" cy="22" r="18"
    stroke="#c4753b" stroke-width="0.4" stroke-opacity="0.18"
    mask="url(#eclipse-mask)"/>
  <circle cx="19" cy="22" r="16"
    stroke="#c4753b" stroke-width="0.4" stroke-opacity="0.12"
    mask="url(#eclipse-mask)"/>

  <!-- ── Corona rays (left/crescent side — fully visible) ── -->

  <!-- Top ray -->
  <line x1="19" y1="10" x2="19" y2="4"
    stroke="url(#ray-fade-top)" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Bottom ray -->
  <line x1="19" y1="34" x2="19" y2="40"
    stroke="url(#ray-fade-bottom)" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Left ray -->
  <line x1="8" y1="22" x2="2" y2="22"
    stroke="url(#ray-fade-left)" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Top-left diagonal -->
  <line x1="12.5" y1="12.5" x2="7.5" y2="7.5"
    stroke="url(#ray-fade-tl)" stroke-width="1.1" stroke-linecap="round"/>

  <!-- Bottom-left diagonal -->
  <line x1="12.5" y1="31.5" x2="7.5" y2="36.5"
    stroke="url(#ray-fade-bl)" stroke-width="1.1" stroke-linecap="round"/>

  <!-- ── Faint corona rays (right/moon side — barely visible, peek from behind) ── -->
  <line x1="30" y1="11" x2="33" y2="8"
    stroke="#c4753b" stroke-width="0.75" stroke-linecap="round" stroke-opacity="0.12"/>
  <line x1="30" y1="33" x2="33" y2="36"
    stroke="#c4753b" stroke-width="0.75" stroke-linecap="round" stroke-opacity="0.12"/>

  <!-- ── Sun corona glow (soft radial, crescent only) ── -->
  <circle cx="19" cy="22" r="14"
    fill="url(#sun-glow)"
    mask="url(#eclipse-mask)"/>

  <!-- ── Sun body (clipped to crescent by eclipse mask) ── -->
  <circle cx="19" cy="22" r="11"
    fill="url(#sun-body)"
    mask="url(#eclipse-mask)"/>

  <!-- ── Sun limb ring (crisp edge of solar disk, crescent only) ── -->
  <circle cx="19" cy="22" r="11"
    stroke="#e8924a" stroke-width="0.6" stroke-opacity="0.5"
    fill="none"
    mask="url(#eclipse-mask)"/>

  <!-- ── Moon disk (transparent — shows background through it) ── -->
  <!-- NOTE: transparency is achieved via the mask above.
       This circle just adds the subtle lunar atmosphere ring. -->
  <circle cx="25" cy="22" r="11"
    stroke="#c4753b" stroke-width="0.5" stroke-opacity="0.14"
    fill="none"/>

  <!-- ── Diamond flare (Baily's bead / contact point sparkle) ── -->
  <circle cx="14.2" cy="22" r="1.1" fill="#e8924a" fill-opacity="0.9"/>
  <circle cx="14.2" cy="22" r="2.2" fill="#e8924a" fill-opacity="0.18"/>
</svg>
